name: Vérification des tests

on:
  pull_request:
    branches:
      -master
  push:
    branches:
      - dev

jobs:
  frontend_test:
    runs-on: ubuntu-latest

    steps:
        
      - name: Checkout du code
        uses: actions/checkout@v3
      - name: Installer les dépendances Node.js du front
        run: npm install
        working-directory: front
      - name: Exécuter les tests du front
        run: npm run test
        working-directory: front

  backend_test:

    runs-on: ubuntu-latest

    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: porte_ouverte
        ports:
        - 32574:3306
        run: |
          sudo /etc/init.d/mysql start
          mysql -e 'CREATE DATABASE ${{ env.DB_DATABASE }};' -u${{ env.DB_USER }} -p${{ env.DB_PASSWORD}}

    steps:

      - name: Set up MySQL
        
      - name: Checkout du code
        uses: actions/checkout@v3
      - name: Installer les dépendances Node.js du back
        run: npm install
        working-directory: back
      - name: lancer le back
        run: npm start
        working-directory: back
      - name: Exécuter les tests du back
        env:
          NODE_ENV: test
          DB_HOST: db
          DB_USER: root
          DB_PASSWORD: password
          DB_NAME: porte_ouverte
        run: npm run test
        working-directory: back
