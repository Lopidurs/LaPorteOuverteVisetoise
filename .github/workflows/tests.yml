name: Vérification des tests

on:
  pull_request:
    branches:
      -master
  push:
    branches:
      - dev

jobs:
  frontend_test:
    runs-on: ubuntu-latest

    steps:
        
      - name: Checkout du code
        uses: actions/checkout@v3
      - name: Installer les dépendances Node.js du front
        run: npm install
        working-directory: front
      - name: Exécuter les tests du front
        run: npm run test
        working-directory: front

  backend_test:

    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      DB_USER: root
      DB_PASSWORD: password
      DB_DATABASE: porte_ouverte

    steps:

      - name: Set up MySQL
        run: |
          sudo /etc/init.d/mysql start
          mysql -e 'CREATE DATABASE ${{ env.DB_DATABASE }};' -u${{ env.DB_USER }} -p${{ env.DB_PASSWORD}}
      - name: Checkout du code
        uses: actions/checkout@v3
      - name: Installer les dépendances Node.js du back
        run: npm install
        working-directory: back
      - name: lancer le back
        run: npm start
        working-directory: back
      - name: Exécuter les tests du back
        run: npm run test
        working-directory: back
