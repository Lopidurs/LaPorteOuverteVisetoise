name: Vérification des tests

on:
  pull_request:
    branches:
      -master
  push:
    branches:
      - dev

jobs:
  frontend_test:
    runs-on: ubuntu-latest

    steps:
        
      - name: Checkout du code
        uses: actions/checkout@v3
      - name: Installer les dépendances Node.js du front
        run: npm install
        working-directory: front
      - name: Exécuter les tests du front
        run: npm run test
        working-directory: front

  backend_test:

    runs-on: ubuntu-latest

      steps:

      - name: Checkout du code
        uses: actions/checkout@v3
      - name: Inistallisation de node  
        uses: actions/setup-node@v3
        with:
          node-version: '16.x'
          cache: 'npm'
      - name: Installer les dépendances Node.js du back
        run: npm install
        working-directory: back
      - name: Exécuter les tests du back
        run: npm run test
        working-directory: back
